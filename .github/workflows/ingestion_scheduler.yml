name: Daily Data Ingestion Scheduler

on:
  schedule:
    # 10:30 AM IST = 05:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-ingestion:
    runs-on: ubuntu-latest
    
    # Required to push the updated database back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # Install Playwright browser dependencies (for fallback scraper)
          playwright install --with-deps chromium

      - name: Run Ingestion Pipeline
        run: |
          python retrieval/vector_store.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Force add the chroma_db directory to track it, bypassing .gitignore
          git add --force data/chroma_db/
          
          if git diff --staged --quiet; then
            echo "No changes detected in ChromaDB."
          else
            git commit -m "chore: automated daily mutual fund data ingestion"
            git push
          fi
